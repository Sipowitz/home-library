version: "3.9"

services:
  db:
    image: postgres:15
    container_name: library_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: library
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

    # ✅ HEALTHCHECK (key addition)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: library_backend
    restart: always

    # ✅ WAIT FOR DB TO BE READY (not just started)
    depends_on:
      db:
        condition: service_healthy

    ports:
      - "8000:8000"

    env_file: # ✅ ADDED
      - .env # ✅ ADDED

    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/library
      # ✅ persistent JWT secret
      SECRET_KEY: super-secure-production-key-123
      # ❌ REMOVED GOOGLE_API_KEY FROM HERE

    volumes:
      - ./backend:/app

    # ✅ explicit + clean
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload

volumes:
  postgres_data:
