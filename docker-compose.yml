services:
  db:
    image: postgres:15
    container_name: library_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: library
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: library_backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/library
      SECRET_KEY: ${SECRET_KEY}
    volumes:
      - ./backend:/app
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --proxy-headers
      --forwarded-allow-ips="*"

  frontend:
    build: ./frontend
    container_name: library_frontend
    restart: always
    expose:
      - "80"

  caddy:
    image: caddy:latest
    container_name: library_caddy
    restart: always

    # ✅ ONLY HTTP — Tailscale handles HTTPS
    ports:
      - "80:80"

    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile

    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
